<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Signals PRO+</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}
h1 { margin-top: 10px; }

table {
    margin: auto;
    width: 95%;
    border-collapse: collapse;
}
td, th {
    padding: 10px;
    border: 1px solid #333;
    font-size: 14px;
}

.buy { color: #00ff99; font-weight: bold; }
.sell { color: #ff4d4d; font-weight: bold; }
.wait { color: orange; }

strong { color: gold; }

.card {
    background: #0f172a;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1>🚀 Binary Signals PRO+</h1>
<p>Live • Multi-Strategy • Auto Refresh (60s)</p>

<div class="card">
<table>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>1m</th>
<th>2m</th>
<th>5m</th>
<th>Strength</th>
</tr>

<tr>
<td>EUR/USD</td>
<td id="trend1"></td>
<td id="s1_1"></td>
<td id="s2_1"></td>
<td id="s5_1"></td>
<td id="power1"></td>
</tr>

<tr>
<td>GBP/USD</td>
<td id="trend2"></td>
<td id="s1_2"></td>
<td id="s2_2"></td>
<td id="s5_2"></td>
<td id="power2"></td>
</tr>

<tr>
<td>USD/JPY</td>
<td id="trend3"></td>
<td id="s1_3"></td>
<td id="s2_3"></td>
<td id="s5_3"></td>
<td id="power3"></td>
</tr>

</table>
</div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const API_KEY = "1ce295bfaf354ce18bdf8d6059237cf9";

// EMA
function ema(period, data) {
    let k = 2/(period+1);
    let arr = [data[0]];
    for (let i=1;i<data.length;i++) {
        arr.push(data[i]*k + arr[i-1]*(1-k));
    }
    return arr;
}

// RSI
function rsi(data, period=14) {
    let gains=0, losses=0;
    for (let i=data.length-period;i<data.length;i++) {
        let diff = data[i]-data[i-1];
        if (diff>0) gains+=diff;
        else losses-=diff;
    }
    let rs = gains / (losses || 1);
    return 100 - (100/(1+rs));
}

async function getSignal(pair, row) {

    let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`;
    let res = await fetch(url);
    let data = await res.json();

    let values = data.values.reverse();
    let closes = values.map(v => parseFloat(v.close));

    let ema50 = ema(50, closes);
    let ema200 = ema(200, closes);
    let lastRSI = rsi(closes);

    let trend = ema50.at(-1) > ema200.at(-1) ? "UP" : "DOWN";

    let last = values.at(-1);
    let prev = values.at(-2);

    let bullish = last.close > last.open;
    let bearish = last.close < last.open;

    let signal = "WAIT";
    let strength = 0;

    // 🔥 STRATEGY 1: TREND PULLBACK
    if (trend === "UP" && lastRSI < 45 && bullish) {
        signal = "BUY"; strength += 30;
    }
    if (trend === "DOWN" && lastRSI > 55 && bearish) {
        signal = "SELL"; strength += 30;
    }

    // 🔥 STRATEGY 2: BREAKOUT
    let high = Math.max(...closes.slice(-10));
    let low = Math.min(...closes.slice(-10));

    if (last.close > high) {
        signal = "BUY"; strength += 25;
    }
    if (last.close < low) {
        signal = "SELL"; strength += 25;
    }

    // 🔥 STRATEGY 3: ENGULFING
    if (last.close > last.open && prev.close < prev.open && last.close > prev.open) {
        signal = "BUY"; strength += 20;
    }
    if (last.close < last.open && prev.close > prev.open && last.close < prev.open) {
        signal = "SELL"; strength += 20;
    }

    // 🔥 STRATEGY 4: RSI EXTREME
    if (lastRSI < 30) {
        signal = "BUY"; strength += 25;
    }
    if (lastRSI > 70) {
        signal = "SELL"; strength += 25;
    }

    if (strength < 25) signal = "WAIT";

    // DISPLAY
    document.getElementById("trend"+row).innerText = trend;

    function setSignal(id, sig) {
        let el = document.getElementById(id);
        el.innerText = sig;
        el.className = sig.toLowerCase();
    }

    setSignal("s1_"+row, signal);
    setSignal("s2_"+row, strength >= 30 ? signal : "WAIT");
    setSignal("s5_"+row, strength >= 50 ? signal : "WAIT");

    document.getElementById("power"+row).innerHTML =
        strength >= 70 ? "<strong>🔥 VERY STRONG</strong>" :
        strength >= 50 ? "STRONG" :
        strength >= 30 ? "MEDIUM" :
        "WEAK";

    // 🔔 ALERT ONLY GOOD SIGNALS
    if (strength >= 50) {
        document.getElementById("alertSound").play();
    }
}

// RUN
function runAll() {
    getSignal("EUR/USD", 1);
    getSignal("GBP/USD", 2);
    getSignal("USD/JPY", 3);
}

runAll();
setInterval(runAll, 60000);

</script>

</body>
</html>
