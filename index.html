<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE Signals</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2 { margin:10px; }

table {
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

td, th {
    border:1px solid #333;
    padding:8px;
}

.buy { color:#00ff99; font-weight:bold; }
.sell { color:#ff4d4d; font-weight:bold; }
.wait { color:orange; }

strong { color:gold; }

.timer {
    font-size:18px;
    margin:10px;
    color:#38bdf8;
}

.card {
    background:#0f172a;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

button {
    padding:5px 10px;
    margin:3px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.win { background:green; color:white; }
.loss { background:red; color:white; }

</style>
</head>

<body>

<h2>🔥 ELITE SIGNAL SYSTEM</h2>

<div class="timer">
Next candle: <span id="countdown">60</span>s
</div>

<div class="card">
Wins: <span id="wins">0</span> |
Loss: <span id="losses">0</span>
</div>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>Signal</th>
<th>Power</th>
<th>Result</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="card">
<h3>📜 Signal History</h3>
<div id="history"></div>
</div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const API_KEY = "YOUR_API_KEY";

// 🔥 BEST 5 PAIRS
const pairs = ["EUR/USD","GBP/USD","USD/JPY","XAU/USD","BTC/USD"];

let history = [];
let wins = 0;
let losses = 0;

// TABLE
function createTable(){
let body=document.getElementById("tableBody");
body.innerHTML="";
pairs.forEach((p,i)=>{
body.innerHTML+=`
<tr>
<td>${p}</td>
<td id="trend${i}"></td>
<td id="sig${i}"></td>
<td id="pow${i}"></td>
<td>
<button class="win" onclick="addWin()">✔</button>
<button class="loss" onclick="addLoss()">✖</button>
</td>
</tr>`;
});
}

// EMA
function ema(p,d){
let k=2/(p+1),arr=[d[0]];
for(let i=1;i<d.length;i++){
arr.push(d[i]*k+arr[i-1]*(1-k));
}
return arr;
}

// RSI
function rsi(d,p=14){
let g=0,l=0;
for(let i=d.length-p;i<d.length;i++){
let diff=d[i]-d[i-1];
if(diff>0)g+=diff;else l-=diff;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

// HISTORY
function addHistory(text){
history.unshift(text);
history = history.slice(0,10);
document.getElementById("history").innerHTML = history.join("<br>");
}

// TRACKER
function addWin(){
wins++;
document.getElementById("wins").innerText=wins;
}

function addLoss(){
losses++;
document.getElementById("losses").innerText=losses;
}

// SIGNAL
async function getSignal(pair,row){

try{

let res=await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`);
let data=await res.json();

if(!data.values){
document.getElementById("trend"+row).innerText="No Data";
return;
}

let v=data.values.reverse();
let closes=v.map(x=>parseFloat(x.close));

let ema50=ema(50,closes);
let ema200=ema(200,closes);
let lastRSI=rsi(closes);

let trend=ema50.at(-1)>ema200.at(-1)?"UP":"DOWN";

let last=v.at(-1);
let prev=v.at(-2);

let signal="WAIT";
let strength=0;

// 🔥 DO NOT TRADE ZONE
if(lastRSI>45 && lastRSI<55){
signal="WAIT";
document.getElementById("trend"+row).innerText="SIDEWAYS";
return;
}

// TREND + CANDLE
if(trend==="UP" && last.close>last.open){
signal="BUY"; strength+=40;
}
if(trend==="DOWN" && last.close<last.open){
signal="SELL"; strength+=40;
}

// BREAKOUT
let high=Math.max(...closes.slice(-10));
let low=Math.min(...closes.slice(-10));

if(last.close>high){signal="BUY"; strength+=30;}
if(last.close<low){signal="SELL"; strength+=30;}

// ENGULFING
if(last.close>last.open && prev.close<prev.open){
signal="BUY"; strength+=20;
}
if(last.close<last.open && prev.close>prev.open){
signal="SELL"; strength+=20;
}

// FILTER
if(strength<50) signal="WAIT";

// DISPLAY
document.getElementById("trend"+row).innerText=trend;

let el=document.getElementById("sig"+row);
el.innerText=signal;
el.className=signal.toLowerCase();

document.getElementById("pow"+row).innerHTML=
strength>=70?"<strong>🔥 STRONG</strong>":
strength>=50?"GOOD":"WEAK";

// HISTORY + ALERT
if(signal!=="WAIT"){
addHistory(pair+" → "+signal);
}

if(strength>=70){
document.getElementById("alertSound").play();
}

}catch(e){
document.getElementById("trend"+row).innerText="Error";
}

}

// RUN
function runAll(){
pairs.forEach((p,i)=>getSignal(p,i));
}

// TIMER
let sec=60;
setInterval(()=>{
sec--;
if(sec<=0){
sec=60;
runAll();
}
document.getElementById("countdown").innerText=sec;
},1000);

// START
createTable();
runAll();

</script>

</body>
</html>
