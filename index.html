<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Signals STABLE</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
}
h2 { margin:10px; }

table {
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

td, th {
    border:1px solid #333;
    padding:8px;
}

.buy { color:#00ff99; font-weight:bold; }
.sell { color:#ff4d4d; font-weight:bold; }
.wait { color:orange; }

strong { color:gold; }

.timer {
    font-size:18px;
    margin:10px;
    color:#38bdf8;
}
</style>
</head>

<body>

<h2>📊 Binary Signals (Stable Version)</h2>
<div class="timer">Next update: <span id="countdown">60</span>s</div>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>1m</th>
<th>2m</th>
<th>5m</th>
<th>Strength</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const API_KEY = "1ce295bfaf354ce18bdf8d6059237cf9";

// ✅ ONLY WORKING PAIRS
const pairs = [
"EUR/USD",
"GBP/USD",
"USD/JPY",
"AUD/USD",
"USD/CAD",
"USD/CHF",
"NZD/USD",
"XAU/USD",   // Gold
"BTC/USD",   // Crypto
"ETH/USD"    // Crypto
];

// CREATE TABLE
function createTable(){
let body = document.getElementById("tableBody");
body.innerHTML="";
pairs.forEach((p,i)=>{
body.innerHTML+=`
<tr>
<td>${p}</td>
<td id="trend${i}"></td>
<td id="s1_${i}"></td>
<td id="s2_${i}"></td>
<td id="s5_${i}"></td>
<td id="power${i}"></td>
</tr>`;
});
}

// EMA
function ema(p,d){
let k=2/(p+1),arr=[d[0]];
for(let i=1;i<d.length;i++){
arr.push(d[i]*k+arr[i-1]*(1-k));
}
return arr;
}

// RSI
function rsi(d,p=14){
let g=0,l=0;
for(let i=d.length-p;i<d.length;i++){
let diff=d[i]-d[i-1];
if(diff>0)g+=diff;else l-=diff;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

// MAIN FUNCTION
async function getSignal(pair,row){

try{

let res=await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`);
let data=await res.json();

// ✅ SAFETY CHECK
if (!data.values || data.status === "error") {
document.getElementById("trend"+row).innerText="No Data";
return;
}

let v=data.values.reverse();
let closes=v.map(x=>parseFloat(x.close));

let ema50=ema(50,closes);
let ema200=ema(200,closes);
let lastRSI=rsi(closes);

let trend=ema50.at(-1)>ema200.at(-1)?"UP":"DOWN";

let last=v.at(-1);
let prev=v.at(-2);

let signal="WAIT";
let strength=0;

// 🔥 STRATEGY 1
if(trend==="UP" && lastRSI<45 && last.close>last.open){
signal="BUY"; strength+=30;
}
if(trend==="DOWN" && lastRSI>55 && last.close<last.open){
signal="SELL"; strength+=30;
}

// 🔥 STRATEGY 2 (Breakout)
let high=Math.max(...closes.slice(-10));
let low=Math.min(...closes.slice(-10));

if(last.close>high){signal="BUY"; strength+=25;}
if(last.close<low){signal="SELL"; strength+=25;}

// 🔥 STRATEGY 3 (Engulfing)
if(last.close>last.open && prev.close<prev.open && last.close>prev.open){
signal="BUY"; strength+=20;
}
if(last.close<last.open && prev.close>prev.open && last.close<prev.open){
signal="SELL"; strength+=20;
}

// 🔥 STRATEGY 4 (RSI)
if(lastRSI<30){signal="BUY"; strength+=25;}
if(lastRSI>70){signal="SELL"; strength+=25;}

// 🚫 FILTER LOW SIGNALS
if(strength < 25) signal="WAIT";

// DISPLAY
document.getElementById("trend"+row).innerText=trend;

function setSig(id,s){
let el=document.getElementById(id);
el.innerText=s;
el.className=s.toLowerCase();
}

setSig("s1_"+row,signal);
setSig("s2_"+row,strength>=30?signal:"WAIT");
setSig("s5_"+row,strength>=50?signal:"WAIT");

document.getElementById("power"+row).innerHTML=
strength>=70?"<strong>🔥 VERY STRONG</strong>":
strength>=50?"STRONG":
strength>=30?"MEDIUM":"WEAK";

// 🔔 ALERT
if(strength>=50){
document.getElementById("alertSound").play();
}

}catch(e){
document.getElementById("trend"+row).innerText="Error";
}

}

// RUN ALL
function runAll(){
pairs.forEach((p,i)=>getSignal(p,i));
}

// TIMER
let sec=60;
setInterval(()=>{
sec--;
if(sec<=0){
sec=60;
runAll();
}
document.getElementById("countdown").innerText=sec;
},1000);

// START
createTable();
runAll();

</script>

</body>
</html>
