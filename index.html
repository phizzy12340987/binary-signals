<script>

// 🔐 API
const API_KEY = "a894c373"+"fc5b4464"+"9cfb84c1"+"634e0ca1";

const pairs = ["EUR/USD","GBP/USD","USD/JPY"];

// 🧠 MARKET OPEN CHECK
function isMarketOpen(){
let now = new Date();
let day = now.getUTCDay(); // 0=Sun
let hour = now.getUTCHours();

if(day === 6) return false; // Saturday closed
if(day === 0 && hour < 21) return false; // Sunday before open
if(day === 5 && hour >= 21) return false; // Friday after close

return true;
}

// 🕒 SESSION
function getSession(){
let h = new Date().getUTCHours();
if(h>=7 && h<=16) return "LONDON";
if(h>=12 && h<=21) return "NEW YORK";
return "ASIA / LOW VOLUME";
}

document.getElementById("session").innerText = getSession();

// UI
function create(){
let b=document.getElementById("body");
b.innerHTML="";
pairs.forEach((p,i)=>{
b.innerHTML+=`
<tr>
<td>${p}</td>
<td id="t${i}"></td>
<td id="s${i}"></td>
<td id="c${i}"></td>
<td id="e${i}"></td>
</tr>`;
});
}

// INDICATORS
function ema(p,d){
let k=2/(p+1),a=[d[0]];
for(let i=1;i<d.length;i++) a.push(d[i]*k+a[i-1]*(1-k));
return a;
}

function rsi(d,p=14){
let g=0,l=0;
for(let i=d.length-p;i<d.length;i++){
let diff=d[i]-d[i-1];
if(diff>0)g+=diff; else l-=diff;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

// 🧠 AI LOGIC (SMART SCORING)
function aiScore({trend,last,prev,closes,rs}){

let score = 0;

// Trend strength
if(trend==="UP") score += 15;
if(trend==="DOWN") score += 15;

// Candle strength
let body = Math.abs(last.close - last.open);
let range = last.high - last.low;

if(body/range > 0.6) score += 15;

// RSI zones
if(rs > 55 && rs < 70) score += 15;
if(rs < 45 && rs > 30) score += 15;

// Breakout
let high = Math.max(...closes.slice(-10));
let low = Math.min(...closes.slice(-10));

if(last.close > high) score += 20;
if(last.close < low) score += 20;

// Engulfing
if(last.close>last.open && prev.close<prev.open) score += 15;
if(last.close<last.open && prev.close>prev.open) score += 15;

// Avoid weak candles
if(body < range*0.3) score -= 20;

return score;
}

// MAIN
async function analyze(pair,i){

if(!isMarketOpen()){
document.getElementById("s"+i).innerHTML="<span class='bad'>MARKET CLOSED</span>";
return {pair,score:0};
}

try{

let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`);
let d = await res.json();

if(!d.values){
document.getElementById("t"+i).innerText="No Data";
return {pair,score:0};
}

let v=d.values.reverse();
let c=v.map(x=>+x.close);

let ema50=ema(50,c);
let ema200=ema(200,c);
let rs=rsi(c);

let trend = ema50.at(-1)>ema200.at(-1)?"UP":"DOWN";

let last=v.at(-1), prev=v.at(-2);

// ❌ NO TRADE ZONE
if(rs>48 && rs<52){
document.getElementById("s"+i).innerHTML="<span class='bad'>NO TRADE</span>";
return {pair,score:0};
}

// 🧠 AI SCORE
let score = aiScore({trend,last,prev,closes:c,rs});

// SIGNAL
let signal="WAIT";
if(trend==="UP" && score>60) signal="BUY";
if(trend==="DOWN" && score>60) signal="SELL";

// ENTRY
let entry="-";
if(score>=85) entry="5m";
else if(score>=70) entry="2m";
else if(score>=60) entry="1m";

// SESSION FILTER
let session = getSession();
if(session==="ASIA / LOW VOLUME") score -= 10;

// FINAL BLOCK
if(score < 60) signal="WAIT";

// UI
document.getElementById("t"+i).innerText=trend;

let s=document.getElementById("s"+i);
s.innerText=signal;
s.className=signal.toLowerCase();

document.getElementById("c"+i).innerText=Math.max(score,0)+"%";
document.getElementById("e"+i).innerText=entry;

return {pair,score,signal,entry};

}catch{
return {pair,score:0};
}

}

// RUN
async function run(){

if(!isMarketOpen()){
document.getElementById("best").innerText="MARKET CLOSED";
return;
}

let results=[];

for(let i=0;i<pairs.length;i++){
let r = await analyze(pairs[i],i);
results.push(r);
await new Promise(r=>setTimeout(r,1000));
}

// BEST
let best = results.sort((a,b)=>b.score-a.score)[0];

if(best.score>=70 && best.signal!=="WAIT"){
document.getElementById("best").innerText =
best.pair+" → "+best.signal+" ("+best.entry+") "+best.score+"%";
}else{
document.getElementById("best").innerText="NO GOOD TRADE";
}

}

create();
run();
setInterval(run,60000);

</script>
