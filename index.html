<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE SIGNALS AI</title>

<style>
body { background:#020617; color:white; font-family:Arial; text-align:center; }

table { width:100%; border-collapse:collapse; font-size:14px; }

td, th { border:1px solid #333; padding:8px; }

.buy { color:#00ff99; font-weight:bold; }
.sell { color:#ff4d4d; font-weight:bold; }
.wait { color:orange; }

.card {
background:#0f172a;
margin:10px;
padding:10px;
border-radius:10px;
}

.best { color:#22c55e; font-size:18px; font-weight:bold; }

.bad { color:red; font-weight:bold; }

</style>
</head>

<body>

<h2>🧠 ULTIMATE SIGNALS AI</h2>

<div class="card best">
Best Trade Now: <span id="best">Scanning...</span>
</div>

<div class="card">
Market: <span id="session"></span>
</div>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>Signal</th>
<th>Confidence</th>
<th>Time</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

// 🔐 Hidden API key
const API_KEY = "a894c373"+"fc5b4464"+"9cfb84c1"+"634e0ca1";

const pairs = ["EUR/USD","GBP/USD","USD/JPY"];

function getSession(){
let h = new Date().getUTCHours();
if(h>=7 && h<=16) return "LONDON";
if(h>=12 && h<=21) return "NEW YORK";
return "OFF MARKET";
}

document.getElementById("session").innerText = getSession();

function create(){
let b=document.getElementById("body");
b.innerHTML="";
pairs.forEach((p,i)=>{
b.innerHTML+=`
<tr>
<td>${p}</td>
<td id="t${i}"></td>
<td id="s${i}"></td>
<td id="c${i}"></td>
<td id="e${i}"></td>
</tr>`;
});
}

function ema(p,d){
let k=2/(p+1),a=[d[0]];
for(let i=1;i<d.length;i++) a.push(d[i]*k+a[i-1]*(1-k));
return a;
}

function rsi(d,p=14){
let g=0,l=0;
for(let i=d.length-p;i<d.length;i++){
let diff=d[i]-d[i-1];
if(diff>0)g+=diff; else l-=diff;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

async function analyze(pair,i){

try{

let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=80&apikey=${API_KEY}`);
let d = await res.json();

if(!d.values){
document.getElementById("t"+i).innerText="No Data";
return {pair,score:0};
}

let v=d.values.reverse();
let c=v.map(x=>+x.close);

let ema50=ema(50,c);
let ema200=ema(200,c);
let rs=rsi(c);

let trend = ema50.at(-1)>ema200.at(-1)?"UP":"DOWN";

let last=v.at(-1), prev=v.at(-2);

let score=0, signal="WAIT";

// RSI filter
if(rs>48 && rs<52){
document.getElementById("s"+i).innerHTML="<span class='bad'>NO TRADE</span>";
return {pair,score:0};
}

// Trend
if(trend==="UP" && last.close>last.open){ signal="BUY"; score+=40; }
if(trend==="DOWN" && last.close<last.open){ signal="SELL"; score+=40; }

// Breakout
let high=Math.max(...c.slice(-8));
let low=Math.min(...c.slice(-8));
if(last.close>high){ score+=30; }
if(last.close<low){ score+=30; }

// Pattern
if(last.close>last.open && prev.close<prev.open) score+=20;
if(last.close<last.open && prev.close>prev.open) score+=20;

// Session boost
let session = getSession();
if(session!=="OFF MARKET") score+=10;

// Final filter
if(score<60) signal="WAIT";

// Entry time
let entry="-";
if(score>=80) entry="5m";
else if(score>=70) entry="2m";
else if(score>=60) entry="1m";

// UI
document.getElementById("t"+i).innerText=trend;

let s=document.getElementById("s"+i);
s.innerText=signal;
s.className=signal.toLowerCase();

document.getElementById("c"+i).innerText=score+"%";
document.getElementById("e"+i).innerText=entry;

return {pair,score,signal,entry};

}catch{
return {pair,score:0};
}

}

async function run(){

let results=[];

for(let i=0;i<pairs.length;i++){
let r = await analyze(pairs[i],i);
results.push(r);
await new Promise(r=>setTimeout(r,1000));
}

// BEST PAIR
let best = results.sort((a,b)=>b.score-a.score)[0];

if(best.score>=70 && best.signal!=="WAIT"){
document.getElementById("best").innerText =
best.pair+" → "+best.signal+" ("+best.entry+") "+best.score+"%";
}else{
document.getElementById("best").innerText="NO GOOD TRADE";
}

}

create();
run();
setInterval(run,60000);

</script>

</body>
</html>
