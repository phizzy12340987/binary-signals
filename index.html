<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Binary Signal Pro</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #1e293b;
}

.buy{color:#22c55e;}
.sell{color:#ef4444;}
.wait{color:#94a3b8;}

#best{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>📊 Binary Signal</h2>
<div id="session"></div>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>Signal</th>
<th>Confidence</th>
<th>Time</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div id="best">Loading...</div>

<script>

const API_KEY = "e920431466e147f98d79a0e84683a990";

// ✅ ONLY BEST 3 PAIRS (STABLE)
const pairs = ["EURUSD","GBPUSD","USDJPY"];

// SESSION
function getSession(){
let h=new Date().getUTCHours();
if(h>=7 && h<=16) return "London Session";
if(h>=12 && h<=21) return "New York Session";
return "Low Volume";
}
document.getElementById("session").innerText = getSession();

// UI
function create(){
let b=document.getElementById("body");
b.innerHTML="";
pairs.forEach((p,i)=>{
b.innerHTML+=`
<tr>
<td>${p}</td>
<td id="t${i}">-</td>
<td id="s${i}">-</td>
<td id="c${i}">-</td>
<td id="e${i}">-</td>
</tr>`;
});
}

// EMA
function ema(p,d){
let k=2/(p+1),a=[d[0]];
for(let i=1;i<d.length;i++) a.push(d[i]*k+a[i-1]*(1-k));
return a;
}

// RSI
function rsi(d,p=14){
let g=0,l=0;
for(let i=d.length-p;i<d.length;i++){
let diff=d[i]-d[i-1];
if(diff>0) g+=diff; else l-=diff;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

// ANALYZE
async function analyze(pair,i){

try{

let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`;

let res = await fetch(url);
let d = await res.json();

if(!d.values){
document.getElementById("s"+i).innerText="No Data";
return {pair,score:0};
}

let v = d.values.reverse();
let closes = v.map(x=>+x.close);

let ema50 = ema(50,closes);
let ema200 = ema(200,closes);
let rs = rsi(closes);

let trend = ema50.at(-1)>ema200.at(-1)?"UP":"DOWN";

let last=v.at(-1);
let prev=v.at(-2);

let score = 0;

// TREND
if(trend==="UP") score+=20;
if(trend==="DOWN") score+=20;

// RSI
if(rs>55 || rs<45) score+=15;

// STRONG CANDLE
let body=Math.abs(last.close-last.open);
let range=last.high-last.low;
if(body/range>0.5) score+=20;

// BREAKOUT
let high=Math.max(...closes.slice(-10));
let low=Math.min(...closes.slice(-10));

if(last.close>high) score+=25;
if(last.close<low) score+=25;

// SIGNAL
let signal="WAIT";
if(trend==="UP" && score>=60) signal="BUY";
if(trend==="DOWN" && score>=60) signal="SELL";

// ENTRY TIME
let entry="-";
if(score>=85) entry="5m";
else if(score>=70) entry="2m";
else if(score>=60) entry="1m";

// UI
document.getElementById("t"+i).innerText=trend;

let s=document.getElementById("s"+i);
s.innerText=signal;
s.className=signal.toLowerCase();

document.getElementById("c"+i).innerText=score+"%";
document.getElementById("e"+i).innerText=entry;

return {pair,score,signal,entry};

}catch{
document.getElementById("s"+i).innerText="Error";
return {pair,score:0};
}

}

// RUN
async function run(){

let results=[];

for(let i=0;i<pairs.length;i++){
let r = await analyze(pairs[i],i);
results.push(r);

// ⏱ prevent API limit
await new Promise(r=>setTimeout(r,1500));
}

// BEST SIGNAL
let best = results.sort((a,b)=>b.score-a.score)[0];

if(best.score>=70 && best.signal!=="WAIT"){
document.getElementById("best").innerText =
best.pair+" → "+best.signal+" ("+best.entry+") "+best.score+"%";
}else{
document.getElementById("best").innerText="NO TRADE";
}

}

// START
create();
run();
setInterval(run,60000);

</script>

</body>
</html>
