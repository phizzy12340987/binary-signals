<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Signals PRO MAX</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}
table {
    margin: auto;
    width: 98%;
    border-collapse: collapse;
}
td, th {
    padding: 8px;
    border: 1px solid #333;
    font-size: 13px;
}
.buy { color: #00ff99; font-weight: bold; }
.sell { color: #ff4d4d; font-weight: bold; }
.wait { color: orange; }
strong { color: gold; }
</style>
</head>

<body>

<h2>🚀 Binary Signals PRO MAX (10 Pairs)</h2>

<table>
<thead>
<tr>
<th>Pair</th>
<th>Trend</th>
<th>1m</th>
<th>2m</th>
<th>5m</th>
<th>Strength</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const API_KEY = "1ce295bfaf354ce18bdf8d6059237cf9";

// 🔥 PAIRS LIST (10)
const pairs = [
    "EUR/USD",
    "GBP/USD",
    "USD/JPY",
    "AUD/USD",
    "USD/CAD",
    "EUR/GBP",
    "EUR/JPY",
    "GBP/JPY",
    "AUD/JPY",
    "EUR/USD" // (OTC-style duplicate placeholder)
];

// EMA
function ema(period, data) {
    let k = 2/(period+1);
    let arr = [data[0]];
    for (let i=1;i<data.length;i++) {
        arr.push(data[i]*k + arr[i-1]*(1-k));
    }
    return arr;
}

// RSI
function rsi(data, period=14) {
    let gains=0, losses=0;
    for (let i=data.length-period;i<data.length;i++) {
        let diff = data[i]-data[i-1];
        if (diff>0) gains+=diff;
        else losses-=diff;
    }
    let rs = gains / (losses || 1);
    return 100 - (100/(1+rs));
}

// CREATE TABLE
function createTable() {
    let body = document.getElementById("tableBody");
    body.innerHTML = "";

    pairs.forEach((pair, i) => {
        body.innerHTML += `
        <tr>
            <td>${pair}</td>
            <td id="trend${i}"></td>
            <td id="s1_${i}"></td>
            <td id="s2_${i}"></td>
            <td id="s5_${i}"></td>
            <td id="power${i}"></td>
        </tr>`;
    });
}

// SIGNAL ENGINE
async function getSignal(pair, row) {

    try {

        let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=100&apikey=${API_KEY}`;
        let res = await fetch(url);
        let data = await res.json();

        if (!data.values) {
            document.getElementById("trend"+row).innerText = "No Data";
            return;
        }

        let values = data.values.reverse();
        let closes = values.map(v => parseFloat(v.close));

        let ema50 = ema(50, closes);
        let ema200 = ema(200, closes);
        let lastRSI = rsi(closes);

        let trend = ema50.at(-1) > ema200.at(-1) ? "UP" : "DOWN";

        let last = values.at(-1);
        let prev = values.at(-2);

        let signal = "WAIT";
        let strength = 0;

        // STRATEGIES
        if (trend === "UP" && lastRSI < 45 && last.close > last.open) {
            signal = "BUY"; strength += 30;
        }
        if (trend === "DOWN" && lastRSI > 55 && last.close < last.open) {
            signal = "SELL"; strength += 30;
        }

        let high = Math.max(...closes.slice(-10));
        let low = Math.min(...closes.slice(-10));

        if (last.close > high) { signal="BUY"; strength+=25; }
        if (last.close < low) { signal="SELL"; strength+=25; }

        if (last.close > last.open && prev.close < prev.open && last.close > prev.open) {
            signal="BUY"; strength+=20;
        }
        if (last.close < last.open && prev.close > prev.open && last.close < prev.open) {
            signal="SELL"; strength+=20;
        }

        if (lastRSI < 30) { signal="BUY"; strength+=25; }
        if (lastRSI > 70) { signal="SELL"; strength+=25; }

        if (strength < 25) signal = "WAIT";

        // DISPLAY
        document.getElementById("trend"+row).innerText = trend;

        function setSignal(id, sig) {
            let el = document.getElementById(id);
            el.innerText = sig;
            el.className = sig.toLowerCase();
        }

        setSignal("s1_"+row, signal);
        setSignal("s2_"+row, strength >= 30 ? signal : "WAIT");
        setSignal("s5_"+row, strength >= 50 ? signal : "WAIT");

        document.getElementById("power"+row).innerHTML =
            strength >= 70 ? "<strong>🔥 VERY STRONG</strong>" :
            strength >= 50 ? "STRONG" :
            strength >= 30 ? "MEDIUM" :
            "WEAK";

        if (strength >= 50) {
            document.getElementById("alertSound").play();
        }

    } catch (e) {
        document.getElementById("trend"+row).innerText = "Error";
    }
}

// RUN ALL
function runAll() {
    pairs.forEach((pair, i) => {
        getSignal(pair, i);
    });
}

createTable();
runAll();
setInterval(runAll, 60000);

</script>

</body>
</html>
